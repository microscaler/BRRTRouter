openapi: 3.0.0
info:
  title: Simple Test API
  version: 1.0.0
  description: Minimal API to test stack overflow issue
servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /pets:
    get:
      summary: List pets (minimal)
      operationId: list_pets
      responses:
        "200":
          description: A simple list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SimplePet"
              examples:
                simple_pets:
                  summary: Simple pets
                  value:
                    - id: "1"
                      name: "Buddy"
                    - id: "2"
                      name: "Max"

components:
  schemas:
    SimplePet:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          example: "1"
        name:
          type: string
          example: "Buddy" 