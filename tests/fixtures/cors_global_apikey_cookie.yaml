# Minimal OpenAPI for HTTP CORS + global API key in cookie (tests/cors_http_security_schemes_tests.rs).
openapi: 3.1.0
info:
  title: CORS global cookie API key
  version: "1.0"
paths:
  /echo:
    get:
      operationId: echo_get
      responses:
        "200":
          description: OK
    options:
      operationId: echo_options
      responses:
        "200":
          description: OK
components:
  securitySchemes:
    SessionCookie:
      type: apiKey
      in: cookie
      name: session
security:
  - SessionCookie: []
