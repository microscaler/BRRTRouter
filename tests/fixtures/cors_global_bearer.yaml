# Minimal OpenAPI for HTTP CORS + global Bearer-only security (tests/cors_http_security_schemes_tests.rs).
openapi: 3.1.0
info:
  title: CORS global Bearer
  version: "1.0"
paths:
  /echo:
    get:
      operationId: echo_get
      responses:
        "200":
          description: OK
    options:
      operationId: echo_options
      responses:
        "200":
          description: OK
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
security:
  - BearerAuth: []
