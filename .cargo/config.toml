# Cargo configuration for BRRTRouter

[build]
# Enable Mermaid diagram rendering in documentation
rustdocflags = ["--html-in-header", "doc/head.html"]

# Cross-compilation: zigbuild/musl-gcc are invoked explicitly via `cargo zigbuild`
# in the Justfile (build-test-image). No linker is set here to avoid conflicts.
#
# macOS cross-compile:  cargo zigbuild --target x86_64-unknown-linux-musl
# Linux native musl:    cargo build --target x86_64-unknown-linux-musl
#
# If you need musl-gcc on Linux without zig, install it and add:
#   [target.x86_64-unknown-linux-musl]
#   linker = "musl-gcc"

rustflags = ["-C", "target-cpu=x86-64"]
