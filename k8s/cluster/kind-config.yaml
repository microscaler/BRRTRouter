# Kind config for BRRTRouter CI (standalone clone) and local dev when not using ../shared-kind-cluster symlink.
# Canonical merged config for microscaler: ../../shared-kind-cluster/kind-config.yaml (default cluster `kind` → context `kind-kind`).
#
# CI (`.github/workflows/ci.yml`): create the cluster with `--name kind` so context is `kind-kind`, matching
# shared-kind-cluster and app Tiltfiles. Do not use a separate cluster name unless you extend `allow_k8s_contexts`.

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    image: kindest/node:v1.34.3
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8000
        protocol: TCP
      - containerPort: 31080
        hostPort: 8080
        protocol: TCP
      - containerPort: 31300
        hostPort: 3000
        protocol: TCP
      - containerPort: 30002
        hostPort: 3002
        protocol: TCP
      - containerPort: 31310
        hostPort: 3100
        protocol: TCP
      - containerPort: 31404
        hostPort: 4040
        protocol: TCP
      - containerPort: 31417
        hostPort: 4317
        protocol: TCP
      - containerPort: 31418
        hostPort: 4318
        protocol: TCP
      - containerPort: 31889
        hostPort: 8889
        protocol: TCP
      - containerPort: 30432
        hostPort: 5433
        protocol: TCP
      - containerPort: 30379
        hostPort: 6379
        protocol: TCP
      - containerPort: 30497
        hostPort: 7497
        protocol: TCP
      - containerPort: 30999
        hostPort: 9999
        protocol: TCP
      - containerPort: 30900
        hostPort: 9000
        protocol: TCP
      - containerPort: 30901
        hostPort: 9001
        protocol: TCP
      - containerPort: 30929
        hostPort: 9292
        protocol: TCP
      - containerPort: 31090
        hostPort: 9090
        protocol: TCP
      - containerPort: 30091
        hostPort: 9091
        protocol: TCP
      - containerPort: 31166
        hostPort: 16686
        protocol: TCP
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry]
      config_path = "/etc/containerd/certs.d"
